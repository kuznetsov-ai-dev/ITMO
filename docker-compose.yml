services:
  app:
    build: ./app
    image: itmo-app:latest
    container_name: itmo-app
    restart: unless-stopped
    env_file:
      - ./app/.env
    volumes:
      - ./app:/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - itmo-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker-1:
    image: itmo-app:latest
    container_name: itmo-worker-1
    restart: unless-stopped
    env_file:
      - ./app/.env
    environment:
      WORKER_ID: worker-1
    command: ["python", "-m", "src.worker"]
    volumes:
      - ./app:/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - itmo-network

  worker-2:
    image: itmo-app:latest
    container_name: itmo-worker-2
    restart: unless-stopped
    env_file:
      - ./app/.env
    environment:
      WORKER_ID: worker-2
    command: ["python", "-m", "src.worker"]
    volumes:
      - ./app:/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - itmo-network

  web-proxy:
    image: nginx:latest
    container_name: itmo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - itmo-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: itmo-rabbitmq
    restart: on-failure
    environment:
      RABBITMQ_DEFAULT_USER: itmo_rabbit
      RABBITMQ_DEFAULT_PASS: itmo_rabbit_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - itmo-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5

  database:
    image: postgres:16
    container_name: itmo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: itmo_db
      POSTGRES_USER: itmo_user
      POSTGRES_PASSWORD: itmo_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - itmo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itmo_user -d itmo_db"]
      interval: 20s
      timeout: 10s
      retries: 5

networks:
  itmo-network:
    driver: bridge

volumes:
  postgres_data: