{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Регистрация</h1>

    {% if form_error %}
        <div class="alert alert-error">{{ form_error }}</div>
    {% endif %}

    <form method="post" action="/register" class="form">
        <label>Логин</label>
        <input
            type="text"
            name="login"
            value="{{ form_data.login if form_data else '' }}"
            required
        >

        <label>Email</label>
        <input
            type="email"
            name="email"
            value="{{ form_data.email if form_data else '' }}"
            required
        >

        <label>Пароль</label>
        <input type="password" name="password" required>

        <button class="btn" type="submit">Создать аккаунт</button>
    </form>
</div>
{% endblock %}
